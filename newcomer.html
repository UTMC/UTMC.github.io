							<p>東大マイコンクラブは常に新入部員を募集しています！<br>
インカレサークルですので、コンピューターに興味のある方なら他大学の方や二年生、三年生の方でも歓迎します。<br>
我々と一緒に有意義な時間を過ごしてみませんか？<br>
入部希望者の方はutmc.komaba[at]gmail.comまでメールをお寄せください([at]を@に置き換えてください)。<br>
部員一同歓迎いたします。</p>
